# SkyRL Configuration: Qwen3 8B on 16x80GB GPUs - BEAM terminal bench
# Distilled from CLI overrides for a 4-node run (4x4 GPUs)

# SkyRL entrypoint module
entrypoint: examples.terminal_bench.entrypoints.main_tbench

# Hydra config groups (+ prefix in CLI)
config_groups:
  terminal_bench_config: terminal_bench

# Terminal bench / agentic environment settings
terminal_bench:
  environment_type: beam
  trials_dir: null

  harbor:
    environment_type: beam
    name: terminus-2
    max_episodes: 128
    enable_summarize: false
    store_all_messages: true
    collect_rollout_details: true
    enable_episode_logging: false
    record_terminal_session: false
    enable_pane_logging: false
    strict_json_parser: false
    # Interleaved Thinking Settings
    interleaved_thinking: true
    extra_body:
      chat_template_kwargs:
        enable_thinking: true
    override_timeout_sec: 2400
    override_cpus: 1
    override_memory_mb: 1024
    override_storage_mb: 1024
    auto_snapshot: true
    n_concurrent_trials: 96
    log_level: INFO

  model_info:
    # Keep max context length at 32768
    max_input_tokens: 32768
    max_output_tokens: 8192
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0

  archiving:
    enabled: false

trainer:
  strategy: fsdp2
  algorithm:
    advantage_estimator: rloo_n
    use_kl_loss: false
    kl_loss_coef: 0.01

  epochs: 1
  update_epochs_per_batch: 1
  train_batch_size: 64
  policy_mini_batch_size: 64
  eval_batch_size: 128
  micro_forward_batch_size_per_gpu: 4
  micro_train_batch_size_per_gpu: 2
  max_prompt_length: 2048
  eval_interval: 20
  eval_before_train: false
  ckpt_interval: 5
  resume_mode: latest
  logger: []
  project_name: dc-agent
  log_level: INFO
  run_name: null
  ckpt_path: null
  export_path: null

  policy:
    optimizer_config:
      lr: 5e-6
      weight_decay: 0.0
    fsdp_config:
      cpu_offload: false
      reshard_after_forward: true
      fsdp_size: 4
  ref:
    fsdp_config:
      cpu_offload: false
      reshard_after_forward: true
      fsdp_size: 4

  placement:
    colocate_all: false
    policy_num_nodes: 4
    ref_num_nodes: 4
    policy_num_gpus_per_node: 4
    ref_num_gpus_per_node: 4

  fully_async:
    max_staleness_steps: 16
    num_parallel_generation_workers: 96

generator:
  backend: vllm
  model_dtype: bfloat16

  inference_engine_tensor_parallel_size: 1
  num_inference_engines: 12

  n_samples_per_prompt: 8
  eval_n_samples_per_prompt: 1

  gpu_memory_utilization: 0.85

  max_num_seqs: 128
  max_num_batched_tokens: 65536

  enable_prefix_caching: true
  enable_chunked_prefill: true
  enforce_eager: false

  run_engines_locally: true
  weight_sync_backend: nccl
  async_engine: true
  batched: false
  enable_http_endpoint: true
  append_eos_token_after_stop_str_in_multi_turn: true

  sampling_params:
    max_generate_length: 30720

  engine_init_kwargs:
    custom_chat_template_chat_completion_path: /e/project1/jureap59/marianna/ot/BenSkyRL/BenSkyRL/skyrl-train/examples/terminal_bench/qwen3_thinking_acc.jinja2
    served_model_name: nl2bash-bugsseq_Qwen3-8B
    max_model_len: 32768

data:
  train_data: []
  val_data: []
